services:
  backend:
    image: runtao-academy-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: runtao-academy-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - JWT_EXPIRES_IN=7d
      - DATABASE_TYPE=${DATABASE_TYPE:-sqlite}
      - SQLITE_PATH=/app/data/runtao-academy.db
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER:-root}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-password}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-runtao_academy}
      - AI_ENABLED=${AI_ENABLED:-true}
      - DEFAULT_AI_PROVIDER=${DEFAULT_AI_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - QWEN_BASE_URL=${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - QWEN_MODEL=${QWEN_MODEL:-qwen-turbo}
    volumes:
      - runtao-academy-data:/app/data
    networks:
      - runtao-academy-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: runtao-academy-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: runtao-academy-frontend
    restart: unless-stopped
    ports:
      - "10089:80"
    depends_on:
      - backend
    networks:
      - runtao-academy-network

  mysql:
    image: mysql:8.0
    container_name: runtao-academy-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD:-password}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-runtao_academy}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - runtao-academy-network
    profiles:
      - mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  runtao-academy-network:
    driver: bridge

volumes:
  runtao-academy-data:
  mysql-data:
